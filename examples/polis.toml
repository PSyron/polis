# Optional deterministic comma corrections from a loopback LanguageTool server.
[language_tool]
base_url = "http://127.0.0.1:8081"
timeout_seconds = 1.0

# Optional reviewable contextual inflection suggestions for one sentence.
# Replace this placeholder with the absolute path to the locally built runner.
[contextual_inflection]
stdio_path = "/absolute/path/to/polis/third_party/languagetool-pl/scripts/run_stdio.sh"
timeout_seconds = 2.0
